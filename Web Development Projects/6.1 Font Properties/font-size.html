<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <title>Font-Size</title>
  <style>
    #pixel {
      font-size: 20px;
    }

    #point {
      font-size: 20pt;
    }

    #em {
      font-size: 1em;
    }

    #rem {
      font-size: rem;
    }

    footer {
      font-size: 30pt;
    }

    html {
      font-size: 1em;
    }
  </style>
</head>
<html lang="en">

<body>
  <h1>1sdafasdf</h1>
  <h1>2</h1>
  <footer>
    <h2>3asdfsadf</h2>
    <h2>4</h2>
  </footer>
</body>

</html>
